[program:college-erp-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/bmc.gtsaas.in/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/bmc.gtsaas.in/storage/logs/worker.log
stopwaitsecs=3600
