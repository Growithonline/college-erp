name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to bmc.gtsaas.in
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, curl, zip, gd, bcmath, intl, mysql

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install NPM dependencies & Build assets
        run: |
          npm ci
          npm run build

      - name: Wait before SSH (avoid rate limiting)
        run: sleep 5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 60s
          connect_timeout: 30s
          command_timeout: 10m
          script: |
            set -e
            cd /var/www/bmc.gtsaas.in

            # Pull latest code (discard any untracked local changes)
            git fetch origin main
            git reset --hard origin/main

            # Install PHP dependencies
            composer install --no-dev --optimize-autoloader --no-interaction

            # Install Node dependencies & build assets
            npm ci
            npm run build

            # Ensure storage directories exist
            mkdir -p storage/framework/views
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/sessions
            mkdir -p storage/logs

            # Run migrations
            php artisan migrate --force

            # Clear old caches first
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan event:clear

            # Rebuild caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Reload PHP-FPM so its opcache picks up the newly deployed code —
            # without this, workers keep serving bytecode compiled from the previous
            # deploy until they happen to recycle on their own (opcache.validate_timestamps
            # is off in production, so PHP never notices the files changed on disk).
            # `reload`, not `restart`: existing workers finish in-flight requests before
            # being replaced, so this doesn't drop any live connections.
            sudo systemctl reload php8.2-fpm || true

            # Restart queue worker via Supervisor
            php artisan queue:restart
            sudo cp /var/www/bmc.gtsaas.in/supervisor.conf /etc/supervisor/conf.d/college-erp-worker.conf
            sudo supervisorctl reread
            sudo supervisorctl update
            sudo supervisorctl restart college-erp-worker:* || true

            # Fix permissions
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            echo "Deployment complete!"
